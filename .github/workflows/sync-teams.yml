name: Sync Teams & Repositories

on:
  push:
    branches:
      - main
    paths:
      - 'teams/teams.json'
      - '.github/workflows/sync-teams.yml'
      - 'profile/README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-teams-and-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: .github-repo

      - name: Sync teams, create repos, and update README
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          ORG_NAME: ActiumDigital
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing required secret ORG_ADMIN_TOKEN."
            exit 1
          fi

          python3 - <<'PYTHON'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          org = os.environ["ORG_NAME"]
          cfg_path = Path(".github-repo/teams/teams.json")
          readme_path = Path(".github-repo/profile/README.md")

          if not cfg_path.exists():
            raise SystemExit("teams/teams.json not found")
          if not readme_path.exists():
            raise SystemExit("profile/README.md not found in .github")

          data = json.loads(cfg_path.read_text(encoding="utf-8"))
          teams = data.get("teams", [])
          if not isinstance(teams, list):
            raise SystemExit("teams must be a list")

          def run(args):
            result = subprocess.run(args, check=True, capture_output=True, text=True)
            return result.stdout.strip()

          def slugify(name: str) -> str:
            slug = name.strip().lower()
            slug = re.sub(r"[^a-z0-9 _-]", "", slug)
            slug = re.sub(r"[ _]+", "-", slug)
            slug = re.sub(r"-{2,}", "-", slug).strip("-")
            return slug

          def repo_exists(repo: str) -> bool:
            result = subprocess.run(
              ["gh", "api", f"/repos/{org}/{repo}"],
              capture_output=True, text=True
            )
            return result.returncode == 0

          def create_repo(repo: str, description: str = "") -> None:
            args = [
              "gh", "api", "--method", "POST", f"/orgs/{org}/repos",
              "-f", f"name={repo}",
              "-f", "private=true",
              "-f", "auto_init=true"
            ]
            if description:
              args += ["-f", f"description={description}"]
            run(args)
            print(f"Created repository: {repo}")

          normalized = []

          for t in teams:
            name = (t.get("name") or "").strip()
            if not name:
              raise SystemExit("Each team requires a non-empty name")

            client = (t.get("client") or name).strip()
            description = (t.get("description") or "").strip()
            alias = (t.get("alias") or description or "").strip()
            tool = (t.get("tool") or "").strip()
            privacy = (t.get("privacy") or "closed").strip()
            members = t.get("members") or []
            repos = t.get("repositories") or []

            if privacy not in ("closed", "secret"):
              raise SystemExit(f"Invalid privacy for team {name}")
            if tool and tool not in ("PBI", "Qlik Sense"):
              raise SystemExit(f"Invalid tool for team {name}: {tool}. Allowed: PBI, Qlik Sense")
            if not isinstance(members, list) or not isinstance(repos, list):
              raise SystemExit(f"members and repositories must be arrays for team {name}")

            slug = slugify(name)
            if not slug:
              raise SystemExit(f"Could not derive slug from team name: {name}")

            exists = subprocess.run(
              ["gh", "api", f"/orgs/{org}/teams/{slug}"],
              capture_output=True, text=True
            )
            if exists.returncode != 0:
              args = ["gh", "api", "--method", "POST", f"/orgs/{org}/teams",
                "-f", f"name={name}", "-f", f"privacy={privacy}"]
              if description:
                args += ["-f", f"description={description}"]
              run(args)
              print(f"Created team: {name}")
            else:
              args = ["gh", "api", "--method", "PATCH", f"/orgs/{org}/teams/{slug}",
                "-f", f"name={name}", "-f", f"privacy={privacy}"]
              if description:
                args += ["-f", f"description={description}"]
              run(args)
              print(f"Updated team: {name}")

            for member in members:
              member = str(member).strip()
              if member:
                run(["gh", "api", "--method", "PUT",
                  f"/orgs/{org}/teams/{slug}/memberships/{member}",
                  "-f", "role=member"])

            for repo in repos:
              repo = str(repo).strip()
              if not repo:
                continue

              if not repo_exists(repo):
                create_repo(repo, f"Team: {name}")

              run(["gh", "api", "--method", "PUT",
                f"/orgs/{org}/teams/{slug}/repos/{org}/{repo}",
                "-f", "permission=admin"])

            normalized.append({
              "client": client,
              "slug": slug,
              "alias": alias,
              "tool": tool,
            })

          start = "<!-- TEAM_REGISTRY_START -->"
          end = "<!-- TEAM_REGISTRY_END -->"
          readme = readme_path.read_text(encoding="utf-8")
          if start not in readme or end not in readme:
            raise SystemExit("Team registry markers missing in profile/README.md")

          lines = [
            start,
            "| Client | Team | Alias | Tool |",
            "| --- | --- | --- | --- |"
          ]

          if normalized:
            for t in normalized:
              team_link = f"**[{t['slug']}](https://github.com/orgs/{org}/teams/{t['slug']})**"
              alias = t["alias"] or ""
              tool = t["tool"] or ""
              lines.append(f"| {t['client']} | {team_link} | {alias} | {tool} |")
          else:
            lines.append("| _No teams registered_ |  |  |  |")

          lines.append(end)
          replacement = "\n".join(lines)

          readme = re.sub(
            rf"{re.escape(start)}.*?{re.escape(end)}",
            replacement,
            readme,
            flags=re.S,
          )
          readme_path.write_text(readme, encoding="utf-8")
          print("Updated client mapping table in profile/README.md")
          PYTHON

      - name: Commit and push changes
        run: |
          cd .github-repo
          if git diff --quiet -- profile/README.md; then
            echo "No README changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "docs: update client mapping from teams config [skip-release]"
          git pull --rebase origin main
          git push origin HEAD:main



